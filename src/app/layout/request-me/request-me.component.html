<div class="request-container">
  <div class="request-bar">
    <select [(ngModel)]="selectedMethod" class="method-select">
      <option *ngFor="let m of methods" [value]="m.value">{{ m.label }}</option>
    </select>

    <input type="text" [(ngModel)]="url" class="url-input" placeholder="http://localhost:8080/matheus/" />

    <button class="send-btn" (click)="sendRequest()">Send</button>
  </div>

  <div class="tabs-bar">
    <button *ngFor="let tab of tabs" class="tab-btn" [class.active]="activeTab === tab" (click)="selectTab(tab)">
      {{ tab }}
    </button>
  </div>

  <div class="tab-content">
    <div *ngIf="activeTab === 'Params'" class="params-section">
      <h4>Query Params</h4>
      <table class="params-table">
        <thead>
          <tr>
            <th>Key</th>
            <th>Value</th>
            <th>Description</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let param of queryParams; let i = index">
            <td><input [(ngModel)]="param.key" placeholder="Key" /></td>
            <td><input [(ngModel)]="param.value" placeholder="Value" /></td>
            <td><input [(ngModel)]="param.description" placeholder="Description" /></td>
            <td><button class="remove-btn" (click)="queryParams.splice(i, 1)">-</button></td>
          </tr>
        </tbody>
      </table>
      <button class="add-param-btn" (click)="addParam()">+ Add parameter</button>
    </div>

    <div *ngIf="activeTab !== 'Params'" class="placeholder-tab">
      <p>{{ activeTab }} section (coming soon)</p>
    </div>
  </div>
  <div class="splitter" (mousedown)="startResize($event)"></div>
  <div class="response-section" [style.height.px]="responseHeight">
    <div class="response-header">
      <span class="status success">{{ responseStatus }}</span>
      <span class="time">{{ responseTime }}</span>
      <span class="size">{{ responseSize }}</span>
    </div>

    <div *ngIf="!responseStored" class="no-response">
      <div class="no-response-icon">⊖</div>
      <p>Response not stored</p>
      <p class="small">Save response setting must have been off when this request was sent.</p>
    </div>

    <div *ngIf="responseStored" class="response-body">
      <p>Response body preview (JSON or text)</p>
    </div>
  </div>
</div>
