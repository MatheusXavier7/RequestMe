<header class="postman-header">
  <div class="left">
    <button class="menu-icon" aria-label="Menu">
      <span>☰</span>
    </button>

    <div class="nav-items">
      <a class="nav-link">Home</a>

      <div class="dropdown-wrapper">
        <button class="nav-link dropdown-toggle">
          Workspaces
          <span class="caret">▼</span>
        </button>
      </div>

      <a class="nav-link">RequestMe</a>
    </div>
  </div>

  <div class="search-wrapper">
    <div class="search-box">
      <input type="text" placeholder="Search RequestMe" />
    </div>
  </div>

  <div class="right">
      <button class="btn invite">Invite</button>
      <button class="icon-btn" aria-label="Settings">⚙</button>
      <button class="icon-btn" aria-label="Notifications">🔔</button>
      <button class="icon-btn" aria-label="Account">👽</button>
    <button class="btn upgrade">Upgrade</button>

    <div class="window-controls">
      <span class="win-min">-</span>
      <span class="win-max">□</span>
      <span class="win-close">×</span>
    </div>
  </div>
</header>
