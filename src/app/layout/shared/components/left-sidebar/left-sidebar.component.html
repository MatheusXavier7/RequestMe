<aside class="sidebar" [class.fully-collapsed]="isFullyCollapsed">
  <div class="icon-bar">

    <button class="toggle-global"
      (click)="toggleFullCollapse()"
      [title]="isFullyCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path *ngIf="!isFullyCollapsed" d="M15 18l-6-6 6-6"/>
        <path *ngIf="isFullyCollapsed"  d="M9 18l6-6-6-6"/>
      </svg>
    </button>

    <button class="icon-btn"
      [class.active]="activeSection === 'collections'"
      (click)="selectSection('collections')"
      title="Collections">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="3" y1="9"  x2="21" y2="9"/>
        <line x1="3" y1="15" x2="21" y2="15"/>
      </svg>
      <span class="icon-label">Collections</span>
    </button>

    <button class="icon-btn"
      [class.active]="activeSection === 'history'"
      (click)="selectSection('history')"
      title="History">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-4.33"/>
        <polyline points="12 7 12 12 15 15"/>
      </svg>
      <span class="icon-label">History</span>
    </button>

  </div>
  <div class="content-area" *ngIf="!isFullyCollapsed && activeSection">
    <div class="section" *ngIf="activeSection === 'collections'">
      <div class="section-header">
        <h3>Collections</h3>
      </div>

      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" [(ngModel)]="collectionSearch" placeholder="Search…"/>
      </div>

      <ul class="collections-list">
        <li *ngFor="let col of filteredCollections">

          <div class="collection-row" [class.active]="col.expanded" (click)="toggleCollection(col)">
            <span class="caret" [class.open]="col.expanded">▶</span>
            <span class="coll-icon">📁</span>
            <span class="coll-name">{{ col.name }}</span>
          </div>

          <ul class="requests-list" *ngIf="col.expanded">
            <li class="request-row"
              *ngFor="let req of col.requests"
              (click)="selectRequest(req)">
              <span class="method-badge" [class]="req.method">{{ req.method }}</span>
              <span class="req-name">{{ req.name }}</span>
            </li>
          </ul>

        </li>
      </ul>

      <div class="empty-state" *ngIf="filteredCollections.length === 0">
        <div class="empty-icon">📭</div>
        <p>No collections found</p>
      </div>
    </div>

    <!-- ════ HISTORY ════ -->
    <div class="section" *ngIf="activeSection === 'history'">
      <div class="section-header">
        <h3>History</h3>
        <div class="header-actions">
          <button class="icon-action" (click)="clearHistory()" title="Clear history">🗑</button>
        </div>
      </div>

      <div class="empty-state" *ngIf="history.length === 0">
        <div class="empty-icon">🕓</div>
        <p>No history yet.<br>Send a request to see it here.</p>
      </div>

      <div *ngIf="todayHistory.length > 0" class="history-group">
        <div class="history-date">Today</div>
        <ul class="history-list">
          <li class="history-item"
            *ngFor="let item of todayHistory"
            (click)="selectHistoryItem(item)">
            <span class="method-badge" [class]="item.method">{{ item.method }}</span>
            <span class="hist-url">{{ item.url }}</span>
          </li>
        </ul>
      </div>

      <div *ngIf="olderHistory.length > 0" class="history-group">
        <div class="history-date">Yesterday</div>
        <ul class="history-list">
          <li class="history-item"
            *ngFor="let item of olderHistory"
            (click)="selectHistoryItem(item)">
            <span class="method-badge" [class]="item.method">{{ item.method }}</span>
            <span class="hist-url">{{ item.url }}</span>
          </li>
        </ul>
      </div>
    </div>

  </div>
</aside>
